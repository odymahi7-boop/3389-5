<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>手速测试 · 暗黑版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,sans-serif;background:#121826;color:#e2e8f0;min-height:100vh;}
.wrap{width:100vw;height:100vh;display:flex;flex-direction:column;}
.head{padding:18px;text-align:center;}
.head h1{font-size:22px;color:#cbd5e1;margin-bottom:6px;}
.head p{color:#94a3b8;font-size:14px;}
.area{flex:1;margin:12px;background:#1e293b;border-radius:24px;position:relative;overflow:hidden;border:1px solid #334155;}
.point{width:52px;height:52px;background:#f87171;border-radius:50%;box-shadow:0 0 15px #f87171;position:absolute;transform:translate(-50%,-50%);display:none;}
.result{padding:16px;text-align:center;}
.item{font-size:15px;color:#a0aec0;margin:4px 0;}
.avg{font-size:19px;color:#60a5fa;font-weight:bold;margin:12px 0;}
.btn{border:none;background:#3b82f6;color:#fff;padding:12px 30px;border-radius:12px;font-size:16px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>极速点击测试</h1>
    <p>5次随机红点 · 毫秒计时</p>
    <p id="tip">剩余次数：5</p>
  </div>
  <div class="area" id="gameArea">
    <div class="point" id="dot"></div>
  </div>
  <div class="result">
    <div id="list"></div>
    <div class="avg" id="avgBox"></div>
    <button class="btn" id="resetBtn" style="display:none" onclick="startGame()">重新开始</button>
  </div>
</div>

<script>
const gameArea = document.getElementById('gameArea');
const dot = document.getElementById('dot');
const tip = document.getElementById('tip');
const list = document.getElementById('list');
const avgBox = document.getElementById('avgBox');
const resetBtn = document.getElementById('resetBtn');

const maxRound = 5;
let nowRound = 0;
let timeArr = [];
let startTime = 0;
let locked = false;

function startGame(){
  nowRound = 0;
  timeArr = [];
  list.innerHTML = '';
  avgBox.innerText = '';
  resetBtn.style.display = 'none';
  tip.innerText = `剩余次数：${maxRound}`;
  setTimeout(createPoint,700);
}

function createPoint(){
  locked = false;
  const w = gameArea.clientWidth;
  const h = gameArea.clientHeight;
  const size = 52;
  let x = Math.random()*(w - size) + size/2;
  let y = Math.random()*(h - size) + size/2;
  dot.style.left = x + 'px';
  dot.style.top = y + 'px';
  dot.style.display = 'block';
  startTime = Date.now();
}

dot.onclick = function(){
  if(locked)return;
  locked = true;
  let t = Date.now() - startTime;
  nowRound++;
  timeArr.push(t);
  dot.style.display = 'none';

  let div = document.createElement('div');
  div.className = 'item';
  div.innerText = `第${nowRound}次：${t} 毫秒`;
  list.appendChild(div);
  tip.innerText = `剩余次数：${maxRound - nowRound}`;

  if(nowRound >= maxRound){
    calcAvg();
  }else{
    setTimeout(createPoint,550);
  }
};

function calcAvg(){
  let sum = timeArr.reduce((a,b)=>a+b,0);
  let avg = (sum / maxRound).toFixed(0);
  avgBox.innerText = `平均反应用时：${avg} ms`;
  resetBtn.style.display = 'inline-block';
}
window.onload = startGame;
</script>
</body>
</html>
